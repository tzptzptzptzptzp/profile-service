name: CI

on:
  push:
    paths:
      - 'cypress/**'
      - 'src/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.11.0'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Start server
        run: npm run start &

      - name: Run unit tests
        run: npm run test

      - name: Run Cypress E2E tests
        run: npm run cy:run
